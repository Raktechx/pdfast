<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | PDFast</title>

<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">

<meta name="robots" content="noindex">

<style>
.not-found{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.not-found-card{
    max-width:700px;
    text-align:center;
    background:#fff;
    border-radius:24px;
    padding:60px;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.not-found h1{
    font-size:90px;
    margin:0;
    color:#f15f51;
    font-weight:800;
}

.not-found h2{
    font-size:42px;
    margin:10px 0;
}

.not-found p{
    color:#666;
    font-size:18px;
    line-height:1.7;
    margin-bottom:35px;
}

.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.primary-btn,
.secondary-btn{
    text-decoration:none;
    padding:14px 28px;
    border-radius:12px;
    font-weight:700;
}

.primary-btn{
    background:#f15f51;
    color:#fff;
}

.secondary-btn{
    border:2px solid #f15f51;
    color:#f15f51;
}

.primary-btn:hover{
    opacity:.9;
}

.secondary-btn:hover{
    background:#f15f51;
    color:#fff;
}
</style>

</head>

<body>

<header class="site-header">

<a class="brand" href="/">
<span class="brand-mark">P</span>
<span>PDFast</span>
</a>

<nav class="main-nav">

<a href="/#tools">All tools</a>
<a href="/about">About</a>
<a href="/faq">FAQ</a>
<a href="/contact">Contact</a>

</nav>

</header>

<main class="not-found">

<div class="not-found-card">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

Sorry, the page you're looking for doesn't exist or has been moved.

</p>

<div class="button-group">

<a href="/" class="primary-btn">

🏠 Back Home

</a>

<a href="/#tools" class="secondary-btn">

📄 Browse PDF Tools

</a>

</div>

</div>

</main>

<footer class="site-footer">

<div class="footer-links">

<a href="/about">About</a>

<a href="/faq">FAQ</a>

<a href="/privacy">Privacy</a>

<a href="/terms">Terms</a>

<a href="/contact">Contact</a>

</div>

<p>

© 2026 PDFast • Fast & Secure PDF Tools

</p>

</footer>

</body>
</html>
